<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Streaming Tracker — Client Example</title>
    <style>
      :root {
        --bg: #0f0f10;
        --card: #1a1a1d;
        --text: #fff;
        --muted: #a8a29e;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        background: var(--card);
        padding: 32px;
        border-radius: 12px;
        max-width: 480px;
        width: 100%;
        text-align: center;
      }
      h1 { font-size: 1.25rem; margin-bottom: 20px; }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 18px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 9999px;
        font-size: 0.9rem;
        color: var(--muted);
      }
      .pill.empty { opacity: 0.5; }
      .icon { width: 18px; height: 18px; fill: currentColor; }
      .config {
        margin-top: 24px;
        font-size: 0.75rem;
        color: var(--muted);
      }
      input {
        margin-top: 8px;
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.3);
        color: var(--text);
        width: 100%;
        font-family: inherit;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Currently Watching</h1>
      <div class="pill" id="pill">
        <svg class="icon" viewBox="0 0 24 24"><path d="M21 3H3c-1.11 0-2 .89-2 2v12a2 2 0 0 0 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5a2 2 0 0 0-2-2zm0 14H3V5h18v12z"/></svg>
        <span id="text">nothing right now</span>
      </div>
      <div class="config">
        <label>API URL</label>
        <input id="apiUrl" placeholder="https://streaming-tracker.xxx.workers.dev" />
      </div>
    </div>
    <script>
      const pill = document.getElementById('pill');
      const text = document.getElementById('text');
      const input = document.getElementById('apiUrl');

      input.value = localStorage.getItem('tracker_api') || '';
      input.addEventListener('change', () => {
        localStorage.setItem('tracker_api', input.value.trim());
        update();
      });

      async function update() {
        const api = input.value.trim();
        if (!api) return;
        try {
          const res = await fetch(api + '?t=' + Date.now());
          const data = await res.json();
          if (data && data.title) {
            text.textContent = `watching ${data.title} on ${data.service}`;
            pill.classList.remove('empty');
          } else {
            text.textContent = 'nothing right now';
            pill.classList.add('empty');
          }
        } catch (e) {
          text.textContent = 'could not load';
          pill.classList.add('empty');
        }
      }

      update();
      setInterval(update, 30000);
    </script>
  </body>
</html>
